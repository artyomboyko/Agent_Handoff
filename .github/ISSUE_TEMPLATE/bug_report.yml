name: Bug report / Сообщение об ошибке
description: Report a problem / Сообщить о проблеме
title: "Bug: "
labels:
  - bug
body:
  - type: dropdown
    id: language
    attributes:
      label: Language / Язык
      options:
        - English
        - Русский
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Use this form for a focused bug report.
        Используйте эту форму для точного сообщения об ошибке.
  - type: textarea
    id: current
    attributes:
      label: Current behavior / Текущее поведение
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce or inspect / Шаги для воспроизведения или проверки
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area / Затронутая область
      options:
        - Standard text / Текст стандарта
        - AGENTS.md
        - ai/ memory files / Файлы памяти ai/
        - Handoff protocol / Протокол handoff
        - GitHub templates / Шаблоны GitHub
        - Repository structure / Структура репозитория
        - Other / Другое
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk / Риск
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks / Проверки перед отправкой
      options:
        - label: I checked for an existing related issue. / Я проверил(а), что похожего Issue нет.
          required: true
