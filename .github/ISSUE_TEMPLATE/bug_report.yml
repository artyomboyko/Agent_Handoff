name: Bug report
description: Report a problem
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a focused bug report.
  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce or inspect
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Standard text
        - AGENTS.md
        - ai/ memory files
        - Handoff protocol
        - GitHub templates
        - Repository structure
        - Other
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I checked for an existing related issue.
          required: true
