name: Refactoring / Рефакторинг
description: Code cleanup or restructuring / Cleanup или перестройка кода
title: "Refactor: "
labels:
  - refactoring
body:
  - type: dropdown
    id: language
    attributes:
      label: Issue language / Язык заполнения Issue
      description: Choose the language you will use to fill in this Issue. Field names stay bilingual. / Выберите язык, на котором будете заполнять Issue. Названия полей остаются двуязычными.
      options:
        - English
        - Русский
    validations:
      required: true
  - type: textarea
    id: code_area
    attributes:
      label: Code area / Область кода
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: Current problem / Текущая проблема
    validations:
      required: true
  - type: textarea
    id: target_state
    attributes:
      label: Target state / Целевое состояние
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals / Что не входит в задачу
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk / Риск
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Required checks / Обязательные проверки
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related files or PRs / Связанные файлы или PR
    validations:
      required: false
