name: Refactoring
about: Plan code cleanup, file decomposition, or internal restructuring
title: "Refactor: "
labels: ["refactoring"]
body:
  - type: markdown
    attributes:
      value: Use this form for focused internal code cleanup.
  - type: textarea
    id: code_area
    attributes:
      label: Code area
      description: Which files, modules, or subsystem are involved?
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: Current problem
      description: What is hard to maintain, duplicated, obsolete, or too large?
    validations:
      required: true
  - type: textarea
    id: target_state
    attributes:
      label: Target state
      description: What should be true after the work is finished?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What must not be changed in this task?
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: What can break if the work is too broad or too early?
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Required checks
      description: Which smoke tests, unit tests, or manual checks are required?
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related files, PRs, or handoffs
      description: Add links or paths that help the next agent.
    validations:
      required: false
