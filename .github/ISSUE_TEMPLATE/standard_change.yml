name: Standard change / Изменение стандарта
description: Improve the standard / Улучшить стандарт
title: "Change: "
labels:
  - enhancement
body:
  - type: dropdown
    id: language
    attributes:
      label: Language / Язык
      options:
        - English
        - Русский
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity / Проблема или возможность
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change / Предлагаемое изменение
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria / Критерии приёмки
    validations:
      required: true
