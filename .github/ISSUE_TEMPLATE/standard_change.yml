name: Standard change
description: Propose an improvement, feature, or process change
title: "Change: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Use this form for improvements to the Agent Handoff standard or repository workflow.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
