name: Standard change / Изменение стандарта
description: Improve the standard / Улучшить стандарт
title: "Change: "
labels:
  - enhancement
body:
  - type: dropdown
    id: language
    attributes:
      label: Issue language / Язык заполнения Issue
      description: Choose the language you will use to fill in this Issue. Field names stay bilingual. / Выберите язык, на котором будете заполнять Issue. Названия полей остаются двуязычными.
      options:
        - English
        - Русский
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity / Проблема или возможность
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change / Предлагаемое изменение
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria / Критерии приёмки
    validations:
      required: true
